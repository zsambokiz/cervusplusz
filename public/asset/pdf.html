<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cervus Plusz - HTML Flipbook</title>
    <style>




    :root {
      --bg: #eef1f4;
      --panel: #1f252c;
      --text: #f3f5f7;
      --muted: #b6c0c9;
      --accent: #3e7b67;
      --shadow: 0 18px 50px rgba(0,0,0,.22);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f5f7fa, #e8edf2);
      color: #111;
    }
    .app {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }
    .sidebar {
      background: linear-gradient(180deg, #212831, #171c22);
      color: var(--text);
      padding: 18px 14px;
      overflow-y: auto;
      border-right: 1px solid rgba(255,255,255,.08);
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 18px;
    }
    .thumbs {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .thumb {
      width: 100%;
      border: 2px solid transparent;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,.06);
      cursor: pointer;
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
    }
    .thumb:hover { transform: translateY(-1px); }
    .thumb.active {
      border-color: #7bb69d;
      box-shadow: 0 0 0 3px rgba(123,182,157,.18);
    }
    .thumb img { width: 100%; display: block; }
    .thumb .cap {
      padding: 8px 10px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
    .main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 22px;
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,.08);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .toolbar .left, .toolbar .right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 14px;
      color: #223;
      background: #fff;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,.08);
    }
    button {
      border: 0;
      background: var(--panel);
      color: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      transition: transform .15s ease, opacity .15s ease, background .15s ease;
    }
    button.secondary {
      background: #fff;
      color: #15202b;
      border: 1px solid rgba(0,0,0,.1);
      font-weight: 600;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .viewer-wrap {
      display: grid;
      place-items: center;
      padding: 28px 20px;
      min-height: 0;
    }
    .viewer {
      width: min(1100px, calc(100vw - 340px));
      aspect-ratio: 2 / 1.414;
      perspective: 2200px;
      position: relative;
    }
    .book-shadow {
      position: absolute;
      inset: auto 4% 0 4%;
      height: 24px;
      background: radial-gradient(ellipse at center, rgba(0,0,0,.26), rgba(0,0,0,0) 70%);
      filter: blur(8px);
      z-index: 0;
    }
    .spread-stage {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      transform-style: preserve-3d;
      box-shadow: var(--shadow);
      overflow: visible;
    }
    .spread {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      overflow: hidden;
      background: white;
      backface-visibility: hidden;
      transform-origin: left center;
      box-shadow: var(--shadow);
    }
    .spread img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: white;
      user-select: none;
      -webkit-user-drag: none;
    }
    .spread.hidden { display: none; }
    .spread.anim-next { animation: flipNext .65s ease forwards; z-index: 3; }
    .spread.anim-prev { animation: flipPrev .65s ease forwards; z-index: 3; }
    @keyframes flipNext {
      0%   { transform: rotateY(0deg) translateX(0); filter: brightness(1); }
      49%  { filter: brightness(.86); }
      100% { transform: rotateY(-88deg) translateX(-18px); filter: brightness(.72); }
    }
    @keyframes flipPrev {
      0%   { transform: rotateY(88deg) translateX(18px); filter: brightness(.72); }
      49%  { filter: brightness(.86); }
      100% { transform: rotateY(0deg) translateX(0); filter: brightness(1); }
    }
    .navbtn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 6;
      width: 52px;
      height: 52px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 24px;
      background: rgba(23,28,34,.9);
      box-shadow: 0 8px 24px rgba(0,0,0,.22);
    }
    .navbtn.prev { left: -26px; }
    .navbtn.next { right: -26px; }
    .footer {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 16px 20px 26px;
      color: #445;
      font-size: 13px;
    }
    a.link {
      color: #0c5c91;
      text-decoration: none;
      font-weight: 700;
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .sidebar {
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,.08);
      }
      .thumbs {
        flex-direction: row;
        overflow-x: auto;
        padding-bottom: 4px;
      }
      .thumb { min-width: 140px; max-width: 140px; }
      .viewer { width: min(94vw, 1100px); }
      .navbtn.prev { left: 6px; }
      .navbtn.next { right: 6px; }
    }
  
    
    
    
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="title">Cervus Plusz HTML flipbook</div>
        <div class="subtitle">Az eredeti PDF oldalainak változatlan vizuális megjelenítésével</div>
        <div class="thumbs" id="thumbs"></div>
      </aside>
      <main class="main">
        <div class="toolbar">
          <div class="left">
            <span class="badge" id="pageLabel">1 / 5</span>
            <button class="secondary" id="fullscreenBtn">Teljes képernyő</button>
            <a class="badge link" href="CervusPDF.pdf" target="_blank" rel="noopener">Eredeti PDF megnyitása</a>
          </div>
          <div class="right">
            <button class="secondary" id="prevTop">← Előző</button>
            <button id="nextTop">Következő →</button>
          </div>
        </div>
        <div class="viewer-wrap">
          <div class="viewer" id="viewer">
            <div class="book-shadow"></div>
            <button class="navbtn prev" id="prevBtn" aria-label="Előző">‹</button>
            <div class="spread-stage" id="stage"></div>
            <button class="navbtn next" id="nextBtn" aria-label="Következő">›</button>
          </div>
        </div>
        <div class="footer">
          <span>Fájl: CervusPDF.pdf</span>
           
          <span>|</span>
           
          <span>5 lapozható nézet</span>
        </div>
      </main>
    </div>
    <script>




    const spreads = [
      { src: '/asset/assets/spread-1.png', label: 'Borító' },
      { src: '/asset/assets/spread-2.png', label: '2-3. oldal' },
      { src: '/asset/assets/spread-3.png', label: '4-5. oldal' },
      { src: '/asset/assets/spread-4.png', label: '6-7. oldal' },
      { src: '/asset/assets/spread-5.png', label: 'Hátlap' }
    ];

    let current = 0;
    let animating = false;

    const thumbs = document.getElementById('thumbs');
    const stage = document.getElementById('stage');
    const pageLabel = document.getElementById('pageLabel');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const prevTop = document.getElementById('prevTop');
    const nextTop = document.getElementById('nextTop');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const viewer = document.getElementById('viewer');

    spreads.forEach((spread, i) => {
      const btn = document.createElement('button');
      btn.className = 'thumb';
      btn.innerHTML = `<img src="${spread.src}" alt="${spread.label}"><div class="cap">${spread.label}</div>`;
      btn.addEventListener('click', () => jumpTo(i));
      thumbs.appendChild(btn);
    });

    function render(noAnim = true, direction = 'next') {
      stage.innerHTML = '';
      const currentEl = document.createElement('div');
      currentEl.className = 'spread';
      currentEl.innerHTML = `<img src="${spreads[current].src}" alt="${spreads[current].label}">`;
      stage.appendChild(currentEl);

      if (!noAnim && stage._oldSrc) {
        const oldEl = document.createElement('div');
        oldEl.className = 'spread ' + (direction === 'next' ? 'anim-next' : 'anim-prev');
        oldEl.innerHTML = `<img src="${stage._oldSrc}" alt="">`;
        stage.appendChild(oldEl);
        oldEl.addEventListener('animationend', () => oldEl.remove(), { once: true });
      }

      [...thumbs.children].forEach((t, i) => t.classList.toggle('active', i === current));
      pageLabel.textContent = `${current + 1} / ${spreads.length}`;
      const atStart = current === 0;
      const atEnd = current === spreads.length - 1;
      prevBtn.disabled = atStart;
      prevTop.disabled = atStart;
      nextBtn.disabled = atEnd;
      nextTop.disabled = atEnd;
    }

    function goNext() {
      if (animating || current >= spreads.length - 1) return;
      animating = true;
      stage._oldSrc = spreads[current].src;
      current += 1;
      render(false, 'next');
      setTimeout(() => animating = false, 700);
    }

    function goPrev() {
      if (animating || current <= 0) return;
      animating = true;
      stage._oldSrc = spreads[current - 1].src;
      current -= 1;
      render(false, 'prev');
      setTimeout(() => animating = false, 700);
    }

    function jumpTo(index) {
      if (index === current || animating) return;
      const direction = index > current ? 'next' : 'prev';
      stage._oldSrc = spreads[direction === 'next' ? current : index].src;
      current = index;
      animating = true;
      render(false, direction);
      setTimeout(() => animating = false, 700);
    }

    prevBtn.addEventListener('click', goPrev);
    nextBtn.addEventListener('click', goNext);
    prevTop.addEventListener('click', goPrev);
    nextTop.addEventListener('click', goNext);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') goNext();
      if (e.key === 'ArrowLeft') goPrev();
    });

    fullscreenBtn.addEventListener('click', async () => {
      if (!document.fullscreenElement) {
        await viewer.requestFullscreen?.();
      } else {
        await document.exitFullscreen?.();
      }
    });

    render(true);
  
    
    
    
    </script>
  </body>
</html>
